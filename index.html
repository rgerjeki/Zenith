<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#05070f" />
    <title>Zenith · the sky above you, right now</title>
    <meta
      name="description"
      content="Zenith drops you onto your spot on Earth and lets you look up at your real night sky."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <canvas id="sky"></canvas>

      <div id="veil"></div>
      <div id="intro-caption"></div>
      <button id="skip-intro" type="button" class="is-hidden">Skip intro</button>
      <div id="hud">
        <div class="hud-top">
          <div class="hud-location"></div>
          <div class="hud-time"></div>
          <button id="change-loc" type="button" class="hud-change">change location</button>
        </div>
        <div class="hud-hint">drag to look around</div>

        <button id="humans" class="hud-humans is-hidden" type="button">
          <span class="hud-humans-count"></span>
          <span class="hud-humans-sub">above you right now</span>
          <div class="hud-humans-names"></div>
        </button>
      </div>

      <div id="focus-overlay" class="is-hidden">
        <button id="focus-close" type="button" aria-label="Close">×</button>
        <button id="narrate-toggle" type="button" aria-label="Toggle narration">
          <span class="narrate-on">🔊</span><span class="narrate-off">🔇</span>
        </button>
        <aside id="focus-card">
          <div class="focus-kind"></div>
          <h2 class="focus-title"></h2>
          <dl class="focus-facts"></dl>
          <div class="focus-briefing">
            <p class="focus-briefing-text"></p>
            <div class="focus-briefing-tag"></div>
          </div>
        </aside>
      </div>

      <div id="locate" class="panel is-hidden">
        <div class="panel-card">
          <h2>Where are you?</h2>
          <p>Zenith shows the real sky above your exact spot, right now.</p>
          <button id="locate-gps" type="button" class="btn btn-primary">
            Use my location
          </button>
          <div class="locate-or"><span>or</span></div>
          <form id="locate-form" novalidate>
            <input
              id="locate-input"
              type="text"
              inputmode="text"
              autocomplete="off"
              spellcheck="false"
              placeholder="City name, or “lat, lon”"
            />
            <button type="submit" class="btn">Show my sky</button>
          </form>
          <div id="locate-status" class="locate-status" role="status"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
